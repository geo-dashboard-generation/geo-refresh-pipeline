name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Run test suite
        run: python -m pytest -q

      - name: Check the pipeline runs end to end
        run: |
          set -euo pipefail
          python -m geo_refresh init smoke
          python -m geo_refresh validate smoke/pipeline.yml
          python -m geo_refresh run smoke/pipeline.yml
          # A second run must detect no change and exit 3.
          set +e
          python -m geo_refresh run smoke/pipeline.yml
          second=$?
          set -e
          if [ "$second" -ne 3 ]; then
            echo "expected exit code 3 (no-change) on the second run, got $second" >&2
            exit 1
          fi
          python -m geo_refresh status smoke/build/manifest.json
        env:
          PYTHONPATH: src

  no-sqlalchemy:
    name: Works without SQLAlchemy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
      - name: Install without the optional sql extra
        run: |
          python -m pip install --upgrade pip
          python -m pip install pydantic PyYAML httpx pytest
      - name: Confirm the sql source degrades with a clear message
        run: python -m pytest -q tests/test_sql_optional.py
        env:
          PYTHONPATH: src

  action:
    name: Composite action
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Scaffold a pipeline to refresh
        run: |
          python -m pip install -r requirements.txt
          PYTHONPATH=src python -m geo_refresh init workspace

      - name: First run — data is new, so it changed
        id: first
        uses: ./
        with:
          config: pipeline.yml
          working-directory: workspace

      - name: Second run — nothing moved
        id: second
        uses: ./
        with:
          config: pipeline.yml
          working-directory: workspace

      - name: Assert the outputs
        run: |
          set -euo pipefail
          test "${{ steps.first.outputs.changed }}" = "true"
          test "${{ steps.first.outputs.stale }}" = "false"
          test "${{ steps.first.outputs.feature-count }}" = "20"
          test "${{ steps.first.outputs.exit-code }}" = "0"
          test "${{ steps.second.outputs.changed }}" = "false"
          test "${{ steps.second.outputs.exit-code }}" = "3"
          test -f "${{ steps.first.outputs.manifest-path }}"
